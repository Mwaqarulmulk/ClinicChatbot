# fly.toml — Fly.io application configuration
# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: This file MUST be committed to git so GitHub Actions CI/CD can
# run `flyctl deploy --remote-only`. Do NOT add fly.toml to .gitignore.
# ─────────────────────────────────────────────────────────────────────────────
app = 'clinicchatbot'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  # Idempotent DB bootstrap before the new machine is promoted. Works with the
  # default Fly volume SQLite database and remote Turso when secrets are set.
  release_command = 'node --import tsx scripts/db-bootstrap.ts'

# ── Non-secret environment variables ─────────────────────────────────────────
# Secrets (GROQ_API_KEY, TURSO_AUTH_TOKEN, ADMIN_API_KEY, …) must be set via:
#   fly secrets set KEY=value
# ─────────────────────────────────────────────────────────────────────────────
[env]
  NODE_ENV         = 'production'
  PORT             = '8080'
  LOG_LEVEL        = 'info'
  WHATSAPP_ENABLED = 'true'

  # Paths inside the persistent volume (mounted at /app/data below)
  WHATSAPP_AUTH_DIR    = '/app/data/baileys-auth'
  TURSO_DATABASE_URL   = 'file:/app/data/local.db'
  LANCEDB_URI          = '/app/data/lancedb'

# ── Persistent volume ─────────────────────────────────────────────────────────
# Stores the SQLite database, LanceDB vector store, and WhatsApp session creds.
# Create once with: fly volumes create chatbot_data --size 3 --region ams
# ─────────────────────────────────────────────────────────────────────────────
[[mounts]]
  source      = 'chatbot_data'
  destination = '/app/data'

# ── HTTP service ──────────────────────────────────────────────────────────────
# auto_stop_machines = false  → machine stays running 24/7 (required for
#                               WhatsApp WebSocket — session dies on sleep)
# min_machines_running = 1    → always at least one machine alive
# ─────────────────────────────────────────────────────────────────────────────
[http_service]
  internal_port        = 8080
  force_https          = true
  auto_start_machines  = true
  auto_stop_machines   = false
  min_machines_running = 1

  # Health check — Fly.io uses this to verify the app is up before routing
  # traffic and to detect crashes. /health always returns 200 once the HTTP
  # server is listening; grace_period covers WhatsApp connection time.
  [[http_service.checks]]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "10s"

# ── Virtual machine ───────────────────────────────────────────────────────────
# 1 GB RAM is needed for LanceDB's native binary + Baileys + Groq SDK.
# ─────────────────────────────────────────────────────────────────────────────
[[vm]]
  cpu_kind = 'shared'
  cpus     = 1
  memory   = '1gb'
