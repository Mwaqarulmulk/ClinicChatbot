# fly.toml app configuration
app = 'clinicchatbot'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  WHATSAPP_ENABLED = 'true'
  WHATSAPP_AUTH_DIR = '/app/data/baileys-auth'
  TURSO_DATABASE_URL = 'file:/app/data/local.db'
  LANCEDB_URI = '/app/data/lancedb'

[[mounts]]
  source = 'chatbot_data'
  destination = '/app/data'

[http_service]
  auto_start_machines = true
  auto_stop_machines = true
  force_https = true
  internal_port = 8080
  min_machines_running = 0

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '1gb'
  memory_mb = 512